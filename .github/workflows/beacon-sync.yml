name: Beacon Chain Sync

on:
  schedule:
    # Run daily at 00:20 UTC (after daily-sync at 00:05 UTC so eth-prices.json is on main)
    - cron: '20 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  beacon-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install firebase-admin tsx --save

      - name: Run beacon sync
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          DUNE_API_KEY: ${{ secrets.DUNE_API_KEY }}
          DUNE_QUERY_ID_CL: ${{ secrets.DUNE_QUERY_ID_CL }}
          DUNE_QUERY_ID_EL: ${{ secrets.DUNE_QUERY_ID_EL }}
          DUNE_QUERY_ID_EL_FALLBACK: ${{ secrets.DUNE_QUERY_ID_EL_FALLBACK }}
          # Run each saved query on Dune before reading rows (no Dune UI “Query refresh” schedule required).
          # Set to false/0/no to only GET latest saved results (saves execution credits; data may be stale).
          DUNE_EXECUTE_BEFORE_FETCH: "true"
          DUNE_EXECUTION_PERFORMANCE: "medium"
          DUNE_EXECUTE_POLL_MS: "4000"
          DUNE_EXECUTE_TIMEOUT_MS: "900000"
          BOOTSTRAP_UID: ${{ secrets.BOOTSTRAP_UID }}
          BOOTSTRAP_TRACKER_ID: ${{ secrets.BOOTSTRAP_TRACKER_ID }}
          BOOTSTRAP_TRACKER_NAME: ${{ secrets.BOOTSTRAP_TRACKER_NAME }}
          BOOTSTRAP_WALLET_ADDRESS: ${{ secrets.BOOTSTRAP_WALLET_ADDRESS }}
          BOOTSTRAP_TAX_RATE: ${{ secrets.BOOTSTRAP_TAX_RATE }}
          BOOTSTRAP_COUNTRY: ${{ secrets.BOOTSTRAP_COUNTRY }}
          BOOTSTRAP_CURRENCY: ${{ secrets.BOOTSTRAP_CURRENCY }}
          BOOTSTRAP_MEV_MODE: ${{ secrets.BOOTSTRAP_MEV_MODE }}
        run: npx tsx scripts/beacon-sync.ts
