name: Daily Transaction Sync

on:
  schedule:
    # Run daily at 00:45 UTC: fetch/store ETH price for *yesterday* UTC (after CoinGecko ~00:35 cutoff for last completed UTC day)
    - cron: '45 0 * * *'
  workflow_dispatch: # Allow manual triggering

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write # Need write to commit price updates

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Use default token with write permissions
      
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      
      - name: Install sync script dependencies
        run: |
          echo '{}' > package.json
          npm install firebase-admin --save
      
      - name: Run daily sync
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          COINGECKO_API_KEY: ${{ secrets.VITE_COINGECKO_API_KEY }}
        run: node scripts/daily-sync.js
